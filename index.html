<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>DnH Fintech | Capital Advisory & Investment Banking</title>

    <meta
      name="description"
      content="DnH Fintech is a strategic capital advisory and investment banking firm connecting startups, SMEs, and enterprises with investors. We provide fundraising, financial consulting, business valuation, and growth advisory services."
    />

    <meta
      name="keywords"
      content="DnH Fintech, DnH, Capital Advisory, Investment Banking, Startup Funding, Fundraising, Business Valuation, Financial Consulting, Venture Capital, Private Equity, SME Funding, Investor Network, Corporate Finance"
    />

    <meta name="author" content="DnH Fintech" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="DnH Fintech | Capital Advisory & Investment Banking"
    />
    <meta
      property="og:description"
      content="Empowering businesses with strategic capital advisory, fundraising, investment banking, and financial consulting services."
    />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="DnH Fintech" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="DnH Fintech | Capital Advisory & Investment Banking"
    />
    <meta
      name="twitter:description"
      content="Connecting businesses with investors through strategic capital advisory and investment banking solutions."
    />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Performance -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue",
          Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        background: #ffffff;
      }

      * {
        box-sizing: border-box;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
